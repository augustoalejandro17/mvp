services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      - mongo
    networks:
      - dance-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    networks:
      - dance-network

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - dance-network

volumes:
  mongo-data:

networks:
  dance-network:
    driver: bridge 