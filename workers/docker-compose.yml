services:
  video-processor:
    build:
      context: ./video-processor
      dockerfile: Dockerfile
    container_name: video-processor-worker
    restart: unless-stopped
    env_file:
      - ./video-processor/.env
    environment:
      - NODE_ENV=production
      - TEMP_VIDEO_DIR=/tmp/videos
    volumes:
      - video-temp:/tmp/videos
    networks:
      - video-processing
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "node index.js", "|", "grep", "-v", "grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

volumes:
  video-temp:
    driver: local

networks:
  video-processing:
    driver: bridge 