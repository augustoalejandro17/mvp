name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run types:build

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web Admin
        run: npm run build --workspace=apps/web-admin

      - name: Run critical auth tests
        run: NODE_OPTIONS=--max-old-space-size=4096 npm run test --workspace=apps/api -- auth.service.spec.ts --runInBand --no-cache
